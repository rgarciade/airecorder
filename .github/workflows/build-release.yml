name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env from secrets
        shell: bash
        run: |
          {
            echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}"
            echo "VITE_WIKI_URL=${{ secrets.VITE_WIKI_URL }}"
          } > .env

      - name: Install dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Rebuild native modules for Electron (x64)
        run: npm run rebuild:win

      - name: Build Windows installer
        run: npm run electron:build:win
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-win
          path: dist-electron/*.exe
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env from secrets
        shell: bash
        run: |
          {
            echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}"
            echo "VITE_WIKI_URL=${{ secrets.VITE_WIKI_URL }}"
          } > .env

      - name: Install dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Rebuild native modules for Electron (arm64)
        run: npm run rebuild

      - name: Build macOS DMG
        run: npm run electron:build
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-mac
          path: dist-electron/*.dmg
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Create .env from secrets
        shell: bash
        run: |
          {
            echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}"
            echo "VITE_WIKI_URL=${{ secrets.VITE_WIKI_URL }}"
          } > .env

      - name: Install dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install

      - name: Rebuild native modules for Electron (x64)
        run: npm run rebuild:linux

      - name: Build Linux packages
        run: npm run electron:build:linux
        env:
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
          if-no-files-found: error

  release:
    name: Attach binaries to draft release
    needs: [build-win, build-mac, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach binaries to existing draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          fail_on_unmatched_files: true
          files: |
            artifacts/build-win/*.exe
            artifacts/build-mac/*.dmg
            artifacts/build-linux/*.AppImage
            artifacts/build-linux/*.deb
