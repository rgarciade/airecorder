name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run opencode PR review
        uses: anomalyco/opencode/github@a3b97d9090ccf4aa9ac32268486283e3131e36b4 # github-v1.2.25
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode-go/qwen3.5-plus
          use_github_token: true
          prompt: |
            Eres un agente de revisión de código especializado en el repositorio AIRecorder.
            Analiza los cambios de esta PR y publica un único comentario con hallazgos en tres áreas.

            ## 1. Validación de documentación

            Revisa qué archivos fueron modificados en esta PR y comprueba si alguno requiere
            actualizar documentación según esta matriz:

            | Archivo modificado | Documentación requerida |
            | :--- | :--- |
            | electron/main.js, electron/preload.js | electron/README.md |
            | electron/database/dbService.js | electron/README.md |
            | src/services/ai/providerRouter.js, src/services/ai/* | src/services/ai/README.md |
            | src/prompts/aiPrompts.js | src/services/ai/README.md |
            | electron/transcriptionManager.js, python/audio_sync_analyzer.py | README.md (raíz) |

            Si un archivo clave fue modificado pero su documentación no fue actualizada, reporta
            exactamente qué archivo de documentación falta.

            ## 2. Complejidad y estructura del código

            Para cada archivo modificado o creado, evalúa con criterio de arquitecto senior:
            - Archivos que concentran demasiada lógica y deberían dividirse en módulos por responsabilidad
            - Funciones que hacen demasiadas cosas y deberían dividirse (principio de responsabilidad única)
            - Mezcla de responsabilidades: UI con lógica de negocio, acceso a datos con transformaciones, etc.

            No uses umbrales fijos de líneas — usa tu criterio: ¿tiene sentido que todo esto esté junto?
            Para cada hallazgo indica: archivo, función (si aplica), razón y sugerencia concreta.

            ## 3. Seguridad

            Revisa el diff buscando:
            - API keys, tokens, contraseñas hardcodeadas
            - Rutas absolutas con nombres de usuario reales (ej. /Users/john.doe/...)
            - Emails, teléfonos, nombres reales de personas en código o comentarios
            - URLs con tokens en query strings o headers
            - Claves privadas o certificados

            Si no hay problemas de seguridad, indícalo explícitamente.

            ## Formato del comentario

            Publica un único comentario con esta estructura exacta:

            ## Revisión automática — AIRecorder Bot

            ### Documentación
            [hallazgos o "Sin problemas detectados"]

            ### Complejidad del código
            [hallazgos o "Sin problemas detectados"]

            ### Seguridad
            [hallazgos o "Sin problemas detectados"]

            ---
            *Revisión generada automáticamente. Los hallazgos son sugerencias — el criterio final es del autor de la PR.*

            Sé directo y específico. Indica archivo y línea cuando sea posible. No escribas texto genérico.
